<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Prácticas Pulpo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans min-h-screen transition-colors duration-500">

    <header class="fixed top-0 left-0 w-full z-50 bg-sky-300 dark:bg-slate-900/95 backdrop-blur-md border-b-4 border-sky-600 dark:border-slate-800 py-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-8">
            <h1 class="text-3xl font-black text-sky-600 dark:text-sky-500 tracking-tight">TaskFlow - Pulpos</h1>        
            
            <button id="theme-toggle" class="group flex items-center gap-3 p-3 px-5 bg-white/20 hover:bg-white/30 dark:bg-slate-800 shadow-xl rounded-2xl border-2 border-white/40 dark:border-indigo-500/50 hover:scale-105 transition-all outline-none backdrop-blur-sm">
                <div class="flex items-center gap-2 dark:hidden">
                <span class="dark:hidden text-xl">🌙</span>
                <span class="text-white font-bold uppercase tracking-wider text-sm">Modo Oscuro</span>
                </div>

                <div class="hidden dark:flex items-center gap-2">
                <span class="hidden dark:inline text-xl">☀️</span>
                <span class="text-indigo-300 font-bold uppercase tracking-wider text-sm">Modo Claro</span>
                </div>
            </button>
        </div>
    </header>
    
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8 px-8 pt-32 pb-12 items-start"> 
        
        <aside class="w-full md:w-64 md:sticky md:top-32 h-fit bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800/50">
            <nav>
                <ul class="space-y-3">
                    <li id="btn-show-pending" class="font-bold text-indigo-600 dark:text-indigo-400 p-3 bg-indigo-50 dark:bg-indigo-900/30 rounded-xl cursor-pointer flex justify-between items-center transition-all">
                        Pendientes
                        <span id="count-pending" class="text-xs bg-indigo-200 dark:bg-indigo-800 px-2 py-1 rounded-full">0</span>
                    </li>
                    <li id="btn-show-completed" class="text-slate-500 dark:text-slate-400 p-3 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl cursor-pointer transition-colors flex justify-between items-center">
                        Completadas
                        <span id="count-completed" class="text-xs bg-slate-200 dark:bg-slate-700 px-2 py-1 rounded-full">0</span>
                    </li>
                    <li id="btn-show-all" class="text-slate-500 dark:text-slate-400 p-3 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl cursor-pointer transition-colors flex justify-between items-center">
                        Todas
                    </li>
                    
                    <hr class="border-slate-100 dark:border-slate-800/50 my-2">
                    
                    <li class="text-slate-400 p-2 flex justify-between items-center italic text-sm">
                        Total tareas
                        <span id="count-total" class="font-mono">0</span>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1 space-y-6 w-full">

            <section id="search-section" class="bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800/50">
                <input type="text" id="search-input" 
                    class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all" 
                    placeholder="🔍 Buscar tarea...">
            </section>

            <div id="view-pending">
                <section class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800/50">
                    <form id="task-form" class="flex gap-2 mb-10">
                        <input type="text" id="task-input" 
                            class="flex-1 p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 dark:text-white focus:border-indigo-500 outline-none" 
                            placeholder="Escribe una nueva tarea..." required>
                        <button type="submit" 
                            class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-4 rounded-xl font-bold transition-all active:scale-95 shadow-lg shadow-indigo-500/20">
                            Añadir
                        </button>
                    </form>

                    <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                        <span class="w-1.5 h-8 bg-indigo-500 rounded-full"></span>
                        Mis Tareas
                    </h2>
                    <div id="tasks-container" class="space-y-4"></div>
                </section>
            </div>

            <div id="view-completed" class="hidden">
                <section class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800/50">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 mb-10">
                        <h2 class="text-xl font-bold flex items-center gap-3">
                            <span class="w-1.5 h-8 bg-slate-300 dark:bg-slate-600 rounded-full"></span>
                            Tareas Completadas
                        </h2>
                        <button id="btn-clear-history" class="flex items-center gap-2 px-5 py-2 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white border border-red-500/20 rounded-xl font-bold transition-all text-sm">
                            <span>🗑️</span> Limpiar historial
                        </button>
                    </div>
                    <div id="completed-container" class="space-y-4"></div>
                </section>
            </div>

            <div id="view-all" class="hidden">
                <section class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800/50">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                        <span class="w-1.5 h-8 bg-amber-500 rounded-full"></span>
                        Vista General (Lectura)
                    </h2>
                    <div id="all-container" class="space-y-4 opacity-80"></div>
                </section>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
