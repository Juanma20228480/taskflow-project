<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow prácticas pulpo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
            <h1>TaskFlow prácticas pulpo</h1>
    </header>
    
    <div class="container"> <aside>
            <nav>
                <ul>
                    <li>Pendientes</li>
                    <li>Completadas</li>
                </ul>
            </nav>
        </aside>
    </div>   
        <main>

    <section id="todo-list">
    <h2>Mis Tareas</h2>

    <form id="task-form"> <!--Interactividad con JavaScript y el DOM
Manipulación de elementos y persistencia local
Uso de JavaScript para transformar la página estática en una aplicación
 dinámica que responde a las acciones del usuario. Empezamos creando un formulario -->
            <input type="text" id="task-input" placeholder="Escribe una nueva tarea:" required>
            <button type="submit">Añadir</button>

        <div id="tasks-container"></div>

        </form>
    
    <div class="task-card">
        <span class="task-title">Diseñar la interfaz</span>
        <span class="badge high">Urgente</span>
        <span class="category">Diseño</span>
    </div>
     
    </section>
        </main>

        <script src="app.js"></script>
   
    
</body>
</html>
