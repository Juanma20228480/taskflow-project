<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Prácticas Pulpo</title>
    <link rel="stylesheet" href="dist/output.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans min-h-screen p-8 pt-40 transition-colors duration-300">

    <header class="fixed top-0 left-0 w-full z-50 bg-slate-50/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 py-6">
        <div class="max-w-7xl mx-auto flex flex-col items-center gap-4 px-8">
            <h1 class="text-4xl font-black text-sky-500 dark:text-sky-400 tracking-tight">TaskFlow prácticas pulpo</h1>        
            
            <button id="theme-toggle" class="p-2 bg-white dark:bg-slate-800 shadow-md rounded-xl border border-slate-100 dark:border-slate-700">
                <span class="dark:hidden">🌙</span>
                <span class="hidden dark:inline">☀️</span>
            </button>
        </div>
    </header>
    
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8 px-8 items-start"> 
        
        <aside class="w-full md:w-64 md:sticky md:top-32 md:top-40 h-fit bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
            <nav>
                <ul class="space-y-3">
                    <li id="btn-show-pending" class="font-bold text-indigo-600 dark:text-indigo-400 p-2 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg cursor-pointer flex justify-between items-center">
                        Pendientes
                        <span id="count-pending" class="text-xs bg-indigo-200 dark:bg-indigo-800 px-2 py-1 rounded-full">0</span>
                    </li>
                    <li id="btn-show-completed" class="text-slate-500 dark:text-slate-400 p-2 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg cursor-pointer transition-colors flex justify-between items-center">
                        Completadas
                        <span id="count-completed" class="text-xs bg-slate-200 dark:bg-slate-700 px-2 py-1 rounded-full">0</span>
                    </li>
                    <hr class="border-slate-100 dark:border-slate-700 my-2">

                    <li class="text-slate-400 p-2 flex justify-between items-center italic">
                    Total tareas
                    <span id="count-total" class="text-xs bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-full border border-slate-200 dark:border-slate-600">0</span>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1">
            <section id="search-section" class="mb-6">
                <input type="text" id="search-input" 
                    class="w-full p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none" 
                    placeholder="Buscar tarea...">
            </section>

            <div id="view-pending">
                <section class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
                    <form id="task-form" class="flex gap-2 mb-8">
                        <input type="text" id="task-input" 
                            class="flex-1 p-3 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 dark:text-white focus:border-indigo-500 outline-none" 
                            placeholder="Escribe una nueva tarea:" required>
                        <button type="submit" 
                            class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 active:scale-95 transition-all duration-200 focus:ring-4 focus:ring-indigo-500/50 outline-none">
                            Añadir
                        </button>
                    </form>

                    <h2 class="text-xl font-bold mb-6 text-slate-800 dark:text-white">Mis Tareas</h2>
                    <div id="tasks-container" class="space-y-4"></div>
                </section>
            </div>

            <div id="view-completed" class="hidden">
                <section class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 dark:text-white">Tareas Completadas</h2>
                    <div id="completed-container" class="space-y-4"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
